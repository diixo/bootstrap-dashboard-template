<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Проверка текста по словарю</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >
</head>

<body class="bg-light">

<div class="container py-5">
    <div class="card shadow-sm">
        <div class="card-body p-4">
            <h1 class="h3 mb-4">
                Проверка текста по словарю
            </h1>

            <!-- Статус загрузки словаря -->
            <div
                id="dictionaryStatus"
                class="alert alert-secondary"
                role="alert"
            >
                Загрузка словаря...
            </div>

            <div class="row g-4">
                <!-- Поле исходного текста -->
                <div class="col-lg-6">
                    <label for="sourceText" class="form-label">
                        Исходный текст
                    </label>

                    <textarea
                        id="sourceText"
                        class="form-control"
                        rows="15"
                        placeholder="Введите текст для проверки..."
                    ></textarea>
                </div>

                <!-- Поле неизвестных слов -->
                <div class="col-lg-6">
                    <label for="unknownWords" class="form-label">
                        Слова, отсутствующие в словаре
                    </label>

                    <textarea
                        id="unknownWords"
                        class="form-control"
                        rows="15"
                        readonly
                        placeholder="Здесь появятся неизвестные слова..."
                    ></textarea>
                </div>
            </div>

            <!-- Кнопки -->
            <div class="d-flex flex-wrap gap-2 mt-4">
                <button
                    id="checkButton"
                    type="button"
                    class="btn btn-primary"
                    disabled
                >
                    Проверить текст
                </button>

                <button
                    id="clearButton"
                    type="button"
                    class="btn btn-outline-secondary"
                >
                    Очистить
                </button>

                <button
                    id="copyButton"
                    type="button"
                    class="btn btn-outline-primary"
                    disabled
                >
                    Копировать результат
                </button>
            </div>

            <!-- Статистика -->
            <div class="mt-4">
                <div>
                    Всего слов в тексте:
                    <strong id="totalWordsCount">0</strong>
                </div>

                <div>
                    Уникальных неизвестных слов:
                    <strong id="unknownWordsCount">0</strong>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    "use strict";

    /*
     * Имя файла словаря.
     * Файл должен находиться в той же папке, что и index.html.
     */
    const DICTIONARY_FILE = "dictionary.txt";

    const sourceTextElement =
        document.getElementById("sourceText");

    const unknownWordsElement =
        document.getElementById("unknownWords");

    const dictionaryStatusElement =
        document.getElementById("dictionaryStatus");

    const checkButton =
        document.getElementById("checkButton");

    const clearButton =
        document.getElementById("clearButton");

    const copyButton =
        document.getElementById("copyButton");

    const totalWordsCountElement =
        document.getElementById("totalWordsCount");

    const unknownWordsCountElement =
        document.getElementById("unknownWordsCount");

    /*
     * Set используется для быстрой проверки наличия слова.
     */
    let dictionary = new Set();

    /**
     * Нормализует слово перед сравнением.
     *
     * Например:
     * "Машина" -> "машина"
     * "Ёлка"    -> "елка"
     */
    function normalizeWord(word) {
        return word
            .toLocaleLowerCase("ru-RU")
            .replaceAll("ё", "е")
            .trim();
    }

    /**
     * Извлекает слова из текста.
     *
     * Поддерживаются:
     * - русские буквы;
     * - английские буквы;
     * - дефисы внутри слов;
     * - апострофы внутри слов.
     *
     * Например:
     * "какой-то" считается одним словом.
     * "don't" считается одним словом.
     */
    function extractWords(text) {
        const words = text.match(
            /[\p{L}]+(?:[-’'][\p{L}]+)*/gu
        );

        return words ?? [];
    }

    /**
     * Загружает dictionary.txt.
     */
    async function loadDictionary() {
        try {
            const response = await fetch(DICTIONARY_FILE, {
                cache: "no-store"
            });

            if (!response.ok) {
                throw new Error(
                    `Ошибка HTTP: ${response.status}`
                );
            }

            const dictionaryText = await response.text();

            /*
             * Словарь может содержать:
             * - одно слово на строку;
             * - несколько слов, разделённых пробелами;
             * - несколько слов, разделённых запятыми.
             */
            const dictionaryWords = dictionaryText
                .split(/[\s,;]+/)
                .map(normalizeWord)
                .filter(word => word.length > 0);

            dictionary = new Set(dictionaryWords);

            dictionaryStatusElement.className =
                "alert alert-success";

            dictionaryStatusElement.textContent =
                `Словарь загружен. Количество слов: ${dictionary.size}.`;

            checkButton.disabled = false;
        } catch (error) {
            console.error(
                "Не удалось загрузить словарь:",
                error
            );

            dictionaryStatusElement.className =
                "alert alert-danger";

            dictionaryStatusElement.textContent =
                "Не удалось загрузить файл dictionary.txt. " +
                "Убедитесь, что файл находится рядом с index.html " +
                "и страница открыта через локальный HTTP-сервер.";

            checkButton.disabled = true;
        }
    }

    /**
     * Проверяет текст по словарю.
     *
     * Эта функция запускается только после нажатия кнопки.
     */
    function checkText() {
        const sourceText = sourceTextElement.value.trim();

        if (sourceText.length === 0) {
            unknownWordsElement.value = "";

            totalWordsCountElement.textContent = "0";
            unknownWordsCountElement.textContent = "0";

            copyButton.disabled = true;

            alert("Введите текст для проверки.");

            sourceTextElement.focus();

            return;
        }

        const extractedWords = extractWords(sourceText);

        const unknownWordsSet = new Set();

        for (const originalWord of extractedWords) {
            const normalizedWord = normalizeWord(originalWord);

            if (
                normalizedWord.length > 0 &&
                !dictionary.has(normalizedWord)
            ) {
                unknownWordsSet.add(normalizedWord);
            }
        }

        /*
         * Преобразуем Set в массив и сортируем слова
         * в алфавитном порядке.
         */
        const unknownWords = Array
            .from(unknownWordsSet)
            .sort((firstWord, secondWord) => {
                return firstWord.localeCompare(
                    secondWord,
                    "ru"
                );
            });

        unknownWordsElement.value =
            unknownWords.join("\n");

        totalWordsCountElement.textContent =
            extractedWords.length;

        unknownWordsCountElement.textContent =
            unknownWords.length;

        copyButton.disabled =
            unknownWords.length === 0;
    }

    /**
     * Очищает оба текстовых поля.
     */
    function clearFields() {
        sourceTextElement.value = "";
        unknownWordsElement.value = "";

        totalWordsCountElement.textContent = "0";
        unknownWordsCountElement.textContent = "0";

        copyButton.disabled = true;

        sourceTextElement.focus();
    }

    /**
     * Копирует неизвестные слова в буфер обмена.
     */
    async function copyResult() {
        const result = unknownWordsElement.value;

        if (result.length === 0) {
            return;
        }

        try {
            await navigator.clipboard.writeText(result);

            const originalText = copyButton.textContent;

            copyButton.textContent = "Скопировано";
            copyButton.disabled = true;

            setTimeout(() => {
                copyButton.textContent = originalText;
                copyButton.disabled = false;
            }, 1000);
        } catch (error) {
            console.error(
                "Не удалось скопировать текст:",
                error
            );

            /*
             * Запасной вариант для старых браузеров.
             */
            unknownWordsElement.select();
            document.execCommand("copy");
        }
    }

    /*
     * Проверка выполняется только по нажатию кнопки.
     * Обработчика события input здесь нет.
     */
    checkButton.addEventListener("click", checkText);

    clearButton.addEventListener("click", clearFields);

    copyButton.addEventListener("click", copyResult);

    /*
     * Загружаем словарь после открытия страницы.
     */
    loadDictionary();
</script>

</body>
</html>
